<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="mid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="gen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="#0b0b0d" rx="12"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="105" x2="800" y2="105" stroke="#1d1d20" stroke-width="0.5"/>
  <line x1="0" y1="195" x2="800" y2="195" stroke="#1d1d20" stroke-width="0.5"/>
  <line x1="0" y1="285" x2="800" y2="285" stroke="#1d1d20" stroke-width="0.5"/>

  <!-- .kappa file -->
  <rect x="310" y="24" width="180" height="52" rx="8" fill="url(#brand)" filter="url(#glow)"/>
  <text x="400" y="48" text-anchor="middle" font-family="-apple-system, 'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="500" fill="#c4b5fd" letter-spacing="1.5" text-transform="uppercase">SOURCE</text>
  <text x="400" y="66" text-anchor="middle" font-family="-apple-system, 'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="600" fill="#ffffff">.kappa file</text>

  <!-- Arrow 1 -->
  <line x1="400" y1="76" x2="400" y2="108" stroke="#7c3aed" stroke-width="2" opacity="0.7"/>
  <polygon points="394,104 400,114 406,104" fill="#7c3aed" opacity="0.7"/>

  <!-- Parser -->
  <rect x="310" y="114" width="180" height="52" rx="8" fill="url(#mid)" filter="url(#glow)"/>
  <text x="400" y="138" text-anchor="middle" font-family="-apple-system, 'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="500" fill="#93c5fd" letter-spacing="1.5">DETERMINISTIC</text>
  <text x="400" y="156" text-anchor="middle" font-family="-apple-system, 'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="600" fill="#ffffff">Parser</text>

  <!-- Arrow 2 -->
  <line x1="400" y1="166" x2="400" y2="198" stroke="#4f46e5" stroke-width="2" opacity="0.7"/>
  <polygon points="394,194 400,204 406,194" fill="#4f46e5" opacity="0.7"/>

  <!-- AST -->
  <rect x="310" y="204" width="180" height="52" rx="8" fill="url(#brand)" filter="url(#glow)"/>
  <text x="400" y="228" text-anchor="middle" font-family="-apple-system, 'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="500" fill="#c4b5fd" letter-spacing="1.5">PORTABLE</text>
  <text x="400" y="246" text-anchor="middle" font-family="-apple-system, 'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="600" fill="#ffffff">AST</text>

  <!-- Fan-out lines -->
  <line x1="340" y1="256" x2="100" y2="304" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
  <line x1="365" y1="256" x2="250" y2="304" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
  <line x1="400" y1="256" x2="400" y2="304" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
  <line x1="435" y1="256" x2="550" y2="304" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
  <line x1="460" y1="256" x2="700" y2="304" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>

  <!-- Arrow tips -->
  <polygon points="94,300 100,310 106,300" fill="#10b981" opacity="0.5"/>
  <polygon points="244,300 250,310 256,300" fill="#10b981" opacity="0.5"/>
  <polygon points="394,300 400,310 406,300" fill="#10b981" opacity="0.5"/>
  <polygon points="544,300 550,310 556,300" fill="#10b981" opacity="0.5"/>
  <polygon points="694,300 700,310 706,300" fill="#10b981" opacity="0.5"/>

  <!-- Generator boxes -->
  <rect x="30" y="310" width="140" height="52" rx="8" fill="url(#gen)"/>
  <text x="100" y="332" text-anchor="middle" font-family="-apple-system, 'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff">Schema</text>
  <text x="100" y="350" text-anchor="middle" font-family="-apple-system, 'Segoe UI', system-ui, sans-serif" font-size="11" fill="#d1fae5" opacity="0.8">Drizzle / SQL</text>

  <rect x="185" y="310" width="130" height="52" rx="8" fill="url(#gen)"/>
  <text x="250" y="332" text-anchor="middle" font-family="-apple-system, 'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff">Types</text>
  <text x="250" y="350" text-anchor="middle" font-family="-apple-system, 'Segoe UI', system-ui, sans-serif" font-size="11" fill="#d1fae5" opacity="0.8">TS / Zod</text>

  <rect x="335" y="310" width="130" height="52" rx="8" fill="url(#gen)"/>
  <text x="400" y="332" text-anchor="middle" font-family="-apple-system, 'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff">API</text>
  <text x="400" y="350" text-anchor="middle" font-family="-apple-system, 'Segoe UI', system-ui, sans-serif" font-size="11" fill="#d1fae5" opacity="0.8">Routes + Auth</text>

  <rect x="485" y="310" width="130" height="52" rx="8" fill="url(#gen)"/>
  <text x="550" y="332" text-anchor="middle" font-family="-apple-system, 'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff">UI</text>
  <text x="550" y="350" text-anchor="middle" font-family="-apple-system, 'Segoe UI', system-ui, sans-serif" font-size="11" fill="#d1fae5" opacity="0.8">Forms + Tables</text>

  <rect x="630" y="310" width="140" height="52" rx="8" fill="url(#gen)"/>
  <text x="700" y="332" text-anchor="middle" font-family="-apple-system, 'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff">Tests</text>
  <text x="700" y="350" text-anchor="middle" font-family="-apple-system, 'Segoe UI', system-ui, sans-serif" font-size="11" fill="#d1fae5" opacity="0.8">Unit + E2E</text>

  <!-- Bottom tagline -->
  <text x="400" y="400" text-anchor="middle" font-family="-apple-system, 'Segoe UI', system-ui, sans-serif" font-size="13" fill="#5b5b5b" letter-spacing="0.5">One parser  ·  Many generators  ·  Zero AI in the pipeline</text>

  <!-- Input adapters (dashed, subtle) -->
  <rect x="20" y="118" width="140" height="44" rx="6" fill="none" stroke="#27272a" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="90" y="138" text-anchor="middle" font-family="-apple-system, 'Segoe UI', system-ui, sans-serif" font-size="11" fill="#5b5b5b">Input Adapters</text>
  <text x="90" y="153" text-anchor="middle" font-family="-apple-system, 'Segoe UI', system-ui, sans-serif" font-size="10" fill="#34343b">OpenAPI · SQL · GQL</text>

  <!-- Arrow from adapters -->
  <line x1="160" y1="140" x2="310" y2="140" stroke="#27272a" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="306,136 314,140 306,144" fill="#27272a"/>
</svg>
